version: '3.8'

services:
  neo4j:
    image: neo4j:5.19.0
    container_name: hybrid_rag_neo4j
    ports:
      - "7474:7474" # Interfaccia Web HTTP
      - "7687:7687" # Protocollo Bolt per connessioni Python
    environment:
      - NEO4J_AUTH=neo4j/Password
      - NEO4J_PLUGINS=["apoc"] # Scarica e abilita automaticamente APOC 5.19.0
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  postgres:
    image: postgres:15
    container_name: hybrid_rag_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Password
      - POSTGRES_DB=used_cars_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: hybrid_rag_pgadmin
    ports:
      - "5050:80" # Accessibile via browser su http://localhost:5050
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=Password
    depends_on:
      - postgres

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: hybrid_rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  qdrant_data:
